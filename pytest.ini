[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -q
markers =
    redis: tests that require a running Redis instance
    grpc: tests that require a running gRPC inference server
    slow: tests that take > 5 seconds
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
