version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Infrastructure for the Streaming Feature Store
#
#  Services:
#    kafka      – message broker for high-throughput transaction stream
#    zookeeper  – Kafka coordination (required by Kafka ≤ 3.x)
#    redis      – L2 feature cache + TTL-based eviction
#    prometheus – metrics collection
#    grafana    – metrics visualisation
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: feature-store-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: feature-store-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"   # JMX metrics
    environment:
      KAFKA_BROKER_ID:                          1
      KAFKA_ZOOKEEPER_CONNECT:                  zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:     PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:               PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:   1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:          "true"
      KAFKA_NUM_PARTITIONS:                     8      # 8 partitions for parallelism
      KAFKA_LOG_RETENTION_HOURS:                24
      KAFKA_LOG_SEGMENT_BYTES:                  104857600
      KAFKA_MESSAGE_MAX_BYTES:                  10485760
      # Performance tuning
      KAFKA_NUM_NETWORK_THREADS:                4
      KAFKA_NUM_IO_THREADS:                     8
      KAFKA_SOCKET_SEND_BUFFER_BYTES:           102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES:        102400
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: feature-store-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --tcp-keepalive 60
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    sysctls:
      - net.core.somaxconn=511

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: feature-store-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: feature-store-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ./docker/grafana_datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro

networks:
  default:
    name: feature-store-network
