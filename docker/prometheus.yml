global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "inference_server"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "feature_store"
    static_configs:
      - targets: ["host.docker.internal:8001"]
    metrics_path: /metrics

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9093"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
